name: Monthly Comprehensive Report

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  monthly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch Latest Data
        env:
          VICTRON_API_TOKEN: ${{ secrets.VICTRON_API_TOKEN }}
        run: |
          python victron_fetcher.py $VICTRON_API_TOKEN

      - name: Analyze Data
        run: |
          python analyzer.py

      - name: Generate Dashboard
        run: |
          python dashboard_generator.py

      - name: Send Monthly Report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          python -c "
          import json
          from email_sender import EmailSender
          from datetime import datetime

          with open('data/analysis.json') as f:
            analysis = json.load(f)

          sender = EmailSender('${{ env.GMAIL_ADDRESS }}', '${{ env.GMAIL_PASSWORD }}')
          html = sender.create_report_html(analysis, 'full')

          if html:
            recipients = '${{ env.EMAIL_RECIPIENTS }}'.split(',')
            month = datetime.now().strftime('%B %Y')
            sender.send_report(
              recipients,
              f'📊 Monthly Solar Report - {month}',
              html,
              attachments=['reports/dashboard.html']
            )
          "

      - name: Commit and push
        run: |
          git config --local user.email "automation@givepower.org"
          git config --local user.name "Solar Monitor Bot"
          git add data/ reports/
          git commit -m "Monthly report - $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push

      - name: Archive reports
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report-${{ github.run_number }}
          path: reports/
          retention-days: 90
