name: Daily Data Sync
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python victron_fetcher.py ${{ secrets.VICTRON_API_TOKEN }}
        env:
          VICTRON_API_TOKEN: ${{ secrets.VICTRON_API_TOKEN }}
      - run: python analyzer.py
      - run: python dashboard_generator.py
      - run: |
          git config --local user.email "automation@givepower.org"
          git config --local user.name "Solar Monitor Bot"
          git add data/ reports/
          git commit -m "Daily data sync - $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: reports/
