name: Daily Data Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch Victron Data
        env:
          VICTRON_API_TOKEN: ${{ secrets.VICTRON_API_TOKEN }}
        run: |
          python victron_fetcher.py $VICTRON_API_TOKEN

      - name: Analyze Data
        run: |
          python analyzer.py

      - name: Generate Dashboard
        run: |
          python dashboard_generator.py

      - name: Commit and push data
        run: |
          git config --local user.email "automation@givepower.org"
          git config --local user.name "Solar Monitor Bot"
          git add data/ reports/
          git commit -m "Daily data sync - $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push

      - name: Upload reports
        uses: actions/upload-artifact@v3
        with:
          name: daily-reports
          path: reports/
